<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grade Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="forms">
      <input id="Physics" type="number" placeholder="Physics">
      <input id="Chemistry" type="number" placeholder="Chemistry">
      <input id="Maths" type="number" placeholder="Maths">
      <input id="Biology" type="number" placeholder="Biology">
    </div>
    <div class="shows">
      <button type="button" id="btn">Calculator Marks</button>
      <h2><span id="result"></span></h2>
    </div>
    <a href="#" id="Grade"></a>
  </div>
  <script src="main.js"></script>
</body>

</html>
